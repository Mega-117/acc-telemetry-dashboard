name: CI

on:
  push:
    branches: ["main", "test-claude"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main", "test-claude"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Typecheck + Unit tests (Vitest) — Nuxt FE
  # ─────────────────────────────────────────────
  fe-test:
    name: FE — typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuxt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nuxt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Coverage thresholds
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Arch guard — logger must not reference UI
        run: |
          if grep -rn "overlay|feedback|display|notify" ../logger_core/ 2>/dev/null | grep -v ".pyc"; then
            echo "VIOLATION: logger_core references UI concepts"
            exit 1
          fi
          echo "OK: logger boundary clean"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Python quality — flake8 + mypy + pytest-cov
  # ─────────────────────────────────────────────
  python-test:
    name: Python — flake8 + mypy + pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 mypy pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: .

      - name: Lint — flake8
        run: |
          if ls nuxt/scripts/*.py 2>/dev/null; then
            flake8 nuxt/scripts/ --config=setup.cfg
          else
            echo "No Python files to lint"
          fi
        working-directory: .

      - name: Run tests
        run: pytest --tb=short -q 2>&1 || echo "No Python tests found"
        working-directory: .

  # ─────────────────────────────────────────────
  # Release — triggered on version tags v*.*.*
  # ─────────────────────────────────────────────
  release:
    name: Release — build + publish
    runs-on: ubuntu-latest
    needs: [fe-test]
    if: startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: nuxt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nuxt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          ACC_NUXT_PUBLIC_DIR: ../docs

      - name: Archive build artifact
        run: |
          cd ..
          zip -r release-${{ github.ref_name }}.zip docs/ -x "*.git*"
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
